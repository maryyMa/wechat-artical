# YouMind 微信公众号 Skill 配置

# YouMind OpenAPI：用于知识库搜索、网页搜索、文章归档和部分生图能力。
youmind:
  api_key: ""              # sk-ym-xxxxxxxxxxxxxxxxxxxx
  base_url: "https://youmind.com/openapi/v1"

# 微信公众号 API 凭证。
# 发布到草稿箱必须配置 appid 和 secret，并把本机公网 IP 加入公众号 API 白名单。
wechat:
  appid: "wx_your_appid"
  secret: "your_secret"
  author: "YouMind"

# 默认排版主题。
theme: "simple"             # simple | center | decoration | prominent
theme_color: "#3498db"      # 任意 HEX 颜色，或工具支持的预设色名

# 图片生成配置。
# 配了 api_key 的 provider 才会启用。
# 优先级：default_provider > 第一个有 key 的 provider > Nano Banana Pro 图库搜索 > CDN 预制封面。
image:
  default_provider: "youmind"  # youmind | gemini | openai | doubao，留空则自动选择
  providers:
    youmind:
      api_key: ""            # 留空则自动复用 youmind.api_key
      model: "nano-banana-pro"
      base_url: "https://youmind.com/v1"
    gemini:
      api_key: ""
      model: "imagen-3.0-generate-002"
    openai:
      api_key: ""
      model: "gpt-image-1"
    doubao:
      api_key: ""
      model: "doubao-seedream-5-0-260128"
      base_url: "https://ark.cn-beijing.volces.com/api/v3"
